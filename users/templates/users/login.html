<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Tradexa Assignment — Python Intern Project">
    <title>Login — Tradexa Assignment</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white:   #ffffff;
            --green:   #16a34a;
            --green-d: #15803d;
            --blue:    #2563eb;
            --blue-d:  #1d4ed8;
            --gray-50: #f8fafc;
            --gray-200:#e2e8f0;
            --gray-400:#94a3b8;
            --gray-600:#475569;
            --gray-800:#1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card */
        .card {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        /* Logo / brand */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px; height: 48px;
            border-radius: 10px;
            background: var(--green);
            margin-bottom: 16px;
        }

        .brand-icon svg {
            width: 24px; height: 24px;
            fill: none; stroke: var(--white);
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--gray-800);
        }

        .brand p {
            font-size: 14px;
            color: var(--gray-600);
            margin-top: 4px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-800);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px; height: 18px;
            color: var(--gray-400);
            pointer-events: none;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px 10px 38px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: var(--gray-800);
            background: var(--white);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        input[type="text"]:focus + .input-icon,
        input[type="password"]:focus + .input-icon {
            color: var(--blue);
        }

        /* Submit button */
        .btn {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: var(--blue);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            margin-top: 24px;
            transition: background-color 0.15s;
        }

        .btn:hover {
            background: var(--blue-d);
        }

        /* Messages */
        .messages { margin-bottom: 20px; }

        .msg-error {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1>Tradexa Assignment</h1>
            <p>Sign in to continue</p>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <p class="msg-error">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ message }}
            </p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" id="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <div class="input-wrap">
                    <input type="text" id="id_username" name="username"
                           placeholder="Enter your username" required autofocus>
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="id_password" name="password"
                           placeholder="Enter your password" required>
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
            </div>

            <button type="submit" class="btn" id="login-btn">Sign In</button>
        </form>
    </div>
</body>
</html>
